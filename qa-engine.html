<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>QA Dynamic Engine - v4.0 PRO</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --success: #10b981; --error: #f43f5e; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .setup-zone { text-align: center; border: 2px dashed var(--primary); background: rgba(99, 102, 241, 0.05); }
        .bookmarklet-btn { display: inline-block; padding: 12px 28px; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; cursor: move; margin: 10px 0; border: 2px solid #fff; transition: 0.3s; }
        .bookmarklet-btn:hover { background: #4f46e5; transform: translateY(-2px); }
        textarea { width: 100%; height: 160px; background: #0b1120; color: #38bdf8; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-family: 'Cascadia Code', monospace; direction: ltr; box-sizing: border-box; font-size: 13px; }
        .btn-group { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        button { border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--error); color: white; }
        .btn-playwright { background: #2b2d31; border: 1px solid #45ba45; color: white; }
        .results-board { display: none; margin-top: 20px; }

        /* סטטיסטיקה */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #0b1120; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid var(--primary); }
        .stat-card.success { border-left-color: var(--success); }
        .stat-card.fail { border-left-color: var(--error); }
        .stat-card.total { border-left-color: #fbbf24; }
        .stat-value { font-size: 28px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 5px; }

        /* טבלה */
        .table-wrapper { background: #0b1120; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 15px; text-align: right; font-weight: bold; color: var(--primary); border-bottom: 2px solid #334155; font-size: 13px; }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; }
        tr:hover { background: rgba(99, 102, 241, 0.05); }

        .field-name { color: #38bdf8; font-weight: bold; font-family: monospace; }
        .field-type { color: #a78bfa; font-size: 12px; }
        .test-value { color: #e2e8f0; max-width: 250px; word-break: break-all; font-family: monospace; }
        .status-pass { background: rgba(16, 185, 129, 0.2); color: var(--success); text-align: center; font-weight: bold; border-radius: 4px; padding: 4px 8px; }
        .status-fail { background: rgba(244, 63, 94, 0.2); color: var(--error); text-align: center; font-weight: bold; border-radius: 4px; padding: 4px 8px; }

        /* סינון */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: #1e293b; color: var(--text); border: 1px solid #334155; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        .footer-bar { display: flex; align-items: center; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #334155; flex-wrap: wrap; }
        .timestamp-badge { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: #94a3b8; display: inline-block; }

        .section-title { color: var(--primary); font-size: 14px; font-weight: bold; padding: 10px 0; }

        .lang-toggle { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .lang-toggle:hover { background: #4f46e5; }

        .clear-btn-fixed { background: #f43f5e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3); transition: 0.2s; }
        .clear-btn-fixed:hover { background: #e11d48; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(244, 63, 94, 0.4); }

        .status-override {
            padding: 6px 10px;
            background-color: #0b1120;
            border: 1px solid #334155;
            color: var(--text);
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            min-width: 140px;
            font-family: system-ui, sans-serif;
            line-height: 1.4;
        }
        .status-override option {
            background: #1e293b;
            color: var(--text);
            padding: 8px;
            line-height: 1.4;
        }
        .status-override:hover {
            background-color: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
        }
        .status-override:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;">
        <h1>🚀 QA Dynamic Engine v4.0 PRO</h1>
    </div>

    <div class="card setup-zone">
        <h3>1. גרור לסרגל המועדפים</h3>
        <a class="bookmarklet-btn" id="bookmarkletLink" href="#">🔍 Extract Page Data</a>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h3>2. קלט JSON מהאתר</h3>
            <textarea id="inputJson" placeholder='הדבק כאן את הנתונים שהועתקו מהבוקמרקלט...'></textarea>
            <button class="btn-primary" onclick="generateMegaSuite()" style="width: 100%; margin-top: 10px;">⚡ צור סוויטת בדיקות</button>
        </div>
        <div class="card">
            <h3>3. סקריפטים לייצוא</h3>
            <textarea id="consoleScript" readonly placeholder='כאן יופיע הקוד לקונסול...'></textarea>
            <div class="btn-group">
                <button class="btn-success" onclick="copyToClipboard('consoleScript')">📋 העתק קוד</button>
                <button class="btn-playwright" onclick="downloadPlaywright()">🎭 Playwright Test</button>
            </div>
        </div>
    </div>
    <div class="card">
        <h3>4. לוח ניתוח תוצאות</h3>
        <p style="font-size: 0.85rem; color: #94a3b8;" id="analysisInfoText">הדבק את ה-JSON שנוצר בסיום הריצה:</p>
        <textarea id="resultJson" placeholder='{"timestamp": "...", "logs": [...] }'></textarea>
        <div class="btn-group">
            <button class="btn-primary" style="background: #f43f5e" onclick="analyzeResults()">📊 נתח תוצאות (Deep Scan)</button>
            <button id="excelBtn" style="display:none; background:white; color:black" onclick="exportToExcel()">📥 הורד אקסל</button>
        </div>

        <div id="resultsBoard" class="results-board">
            <!-- סטטיסטיקה -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- סינון -->
            <div class="filter-bar" id="filterBar"></div>

            <!-- טבלה -->
            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th style="text-align: right;" id="th-fieldName">שם השדה</th>
                            <th style="text-align: right;" id="th-testValue">הערך שנבדק</th>
                            <th style="text-align: right;" id="th-expectedResult">תוצאה צפויה</th>
                            <th style="text-align: right;" id="th-actualResult">תוצאה בפועל</th>
                            <th style="text-align: center;" id="th-result">תוצאה</th>
                            <th style="text-align: center;" id="th-override">עקוף</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Footer Bar -->
    <div class="footer-bar">
        <span class="timestamp-badge" id="updateLabel"></span>
        <button onclick="toggleLanguage()" class="lang-toggle">🌐 English / עברית</button>
        <button onclick="clearAllData()" class="clear-btn-fixed">🗑️ נקה הכל</button>
    </div>
</div>
<script>
    const updateTime = new Date().toLocaleString('he-IL');
    document.getElementById('updateLabel').innerText = "Update: " + updateTime;
    const bScript = `javascript:(function(){const d={url:window.location.href,forms:Array.from(document.forms).map((f,idx)=>({id:f.id||f.name||'form_'+idx,inputs:Array.from(f.elements).filter(e=>['INPUT','TEXTAREA','SELECT'].includes(e.tagName)).map(e=>({name:e.name||e.id,type:e.type,placeholder:e.placeholder}))}))};const json=JSON.stringify(d,null,2);navigator.clipboard.writeText(json).then(()=>{alert('✅ נתוני הדף הועתקו!\\n\\nאם לא הצליח, הJSON מוצג בחלון חדש');}).catch(err=>{const w=window.open();w.document.write('<pre style="white-space:pre-wrap;word-wrap:break-word;padding:20px;">'+json+'</pre>');alert('⚠️ Clipboard לא זמין.\\n\\nהJSON הוצג בחלון חדש.\\nאנא העתק ידנית (Ctrl+A ואחרי זה Ctrl+C).');});})();`;
    document.getElementById('bookmarkletLink').href = bScript;

    function generateMegaSuite() {
        const raw = document.getElementById('inputJson').value;
        if(!raw) return;
        const data = JSON.parse(raw);

        const cCode = `(async function runMegaQA() {
    const results = { timestamp: new Date().toLocaleString(), logs: [] };
    const log = (msg, pass, type='test', field='', testValue='', expected='') => {
        results.logs.push({ msg, pass, type, field, testValue, expected });
        console.log('%c' + (pass?'✅':'❌') + ' ' + msg, 'color:' + (pass?'#10b981':'#f43f5e'));
    };
    const delay = ms => new Promise(r => setTimeout(r, ms));
    const testLibrary = {
        email: {
            values: ["valid@test.com", "plainaddress", "test@test.", "@domain.com", "a@b.c", " ".repeat(5) + "a@b.com"],
            expected: "Valid emails should pass, invalid format should show error or be rejected"
        },
        tel: {
            values: ["0501234567", "123", "abc", "+972-50-123-4567", "0".repeat(15), "!@#$%^"],
            expected: "Valid phone numbers should pass, invalid format should show error or be rejected"
        },
        number: {
            values: ["100", "-1", "abc", "3.14", "!@#", "0".repeat(15)],
            expected: "Only numeric values should pass, letters/symbols should be rejected"
        },
        zip: {
            values: ["12345", "abc", "!@#$%", "   ", "A1234"],
            expected: "Only numeric values should pass, letters/symbols should be rejected"
        },
        text: {
            values: ["Standard", "<script>alert(1)<\\/script>", "' OR '1'='1", "A".repeat(500), "   ", "אימוג'י 🔥"],
            expected: "Should accept text input and display properly"
        },
        checkbox: {
            values: ["toggle"],
            expected: "Checkbox should toggle between checked and unchecked"
        }
    };
    const forms = ${JSON.stringify(data.forms)};

    for(const f of forms) {
        log('--- STARTING DEEP SCAN: ' + f.id + ' ---', true, 'header');

        for(const i of f.inputs) {
            const el = document.getElementsByName(i.name)[0] || document.getElementById(i.name);
            if(!el) { log('Field not found: ' + i.name, false, 'test', i.name, 'N/A', 'Field should exist'); continue; }
            // בחירת קטגוריית בדיקה
            let cat = i.type;
            if(i.name.toLowerCase().includes('phone') || i.name.toLowerCase().includes('mobile')) cat = 'tel';
            if(i.name.toLowerCase().includes('email')) cat = 'email';
            if(i.name.toLowerCase().includes('zip') || i.name.toLowerCase().includes('postal')) cat = 'zip';
            if(!testLibrary[cat]) cat = 'text';

            const libItem = testLibrary[cat];
            const values = libItem.values || [libItem];
            const expectedResult = libItem.expected || 'Should accept input';

            log('Testing Field: [' + i.name + '] (Type: ' + cat + ')', true, 'action', i.name, '', expectedResult);

            // === בדיקות Accessibility לשדה ===
            // בדוק Label
            const fieldId = el.getAttribute('id');
            const hasLabel = fieldId && document.querySelector('label[for="' + fieldId + '"]');
            const hasAriaLabel = el.getAttribute('aria-label') || el.getAttribute('aria-labelledby');
            const hasPlaceholder = el.getAttribute('placeholder');
            const hasAccessibleName = hasLabel || hasAriaLabel || hasPlaceholder;
            log('Field Accessibility: [' + i.name + ']', true, 'action', i.name, '', 'Checking accessibility');
            log('  Has Label: ' + (hasLabel ? 'Yes' : 'No') + ' | Aria-Label: ' + (hasAriaLabel ? 'Yes' : 'No') + ' | Placeholder: ' + (hasPlaceholder ? 'Yes' : 'No'), hasAccessibleName, 'test', i.name, '', 'Should have label/aria-label/placeholder');

            // בדוק אם שדה disabled או hidden
            const isDisabled = el.disabled || el.getAttribute('aria-disabled') === 'true';
            log('  Field is accessible: ' + (!isDisabled ? 'Yes' : 'No (disabled)'), !isDisabled, 'test', i.name, '', 'Field should not be disabled');

            // בדוק סוג input מתאים
            const hasType = el.getAttribute('type') || el.tagName.toLowerCase();
            log('  Input type: ' + hasType, true, 'test', i.name, '', 'Field should have proper input type');

            if(i.type === 'checkbox') {
                el.checked = !el.checked;
                el.dispatchEvent(new Event('change', {bubbles:true}));
                log('Toggled checkbox: ' + i.name, true, 'test', i.name, 'toggle', testLibrary.checkbox.expected);
                await delay(50);
            } else {
                for(const val of values) {
                    el.value = ""; // Reset
                    el.focus();
                    el.value = val;
                    el.dispatchEvent(new Event('input', {bubbles:true}));
                    el.dispatchEvent(new Event('change', {bubbles:true}));
                    el.blur();

                    // חכה לvalidation
                    await delay(200);

                    // בדוק אם יש שגיאה
                    let hasError = false;
                    let errorMessage = '';

                    // בדוק aria-invalid
                    if(el.getAttribute('aria-invalid') === 'true') {
                        hasError = true;
                        errorMessage = 'aria-invalid detected';
                    }

                    // בדוק CSS classes
                    if(el.classList.contains('is-invalid') || el.classList.contains('error') || el.classList.contains('ng-invalid')) {
                        hasError = true;
                        errorMessage = 'CSS error class detected';
                    }

                    // בדוק error message בחלון ההורה וסביבה
                    const parent = el.parentElement;
                    if(parent && !errorMessage) {
                        // חפש בקלסים שונים
                        const errorElem = parent.querySelector('.error, .help-block, [role="alert"], .invalid-feedback, .form-error, .error-message, .error-text, .field-error, .validation-error, .alert-danger, [class*="error"]');
                        if(errorElem && errorElem.innerText.trim()) {
                            errorMessage = errorElem.innerText.trim();
                        }
                    }

                    // אם עדיין לא מצאנו - חפש בדוקומנט כולו לאחרונה (עבור toast/popup messages)
                    if(!errorMessage && (hasError || el.classList.contains('is-invalid'))) {
                        const allErrors = document.querySelectorAll('[role="alert"], .alert-danger, .toast-error, [class*="error-message"]');
                        if(allErrors.length > 0) {
                            errorMessage = allErrors[allErrors.length - 1].innerText.trim().substring(0, 100); // limit to 100 chars
                        }
                    }

                    // בדוק אם הערך בפועל הגיע לשדה
                    const valueAccepted = el.value === val;

                    // קבע את ה-expected result בהתאם לערך שמוכנס
                    let testPassed = false;
                    let resultMessage = val;
                    let expectedForValue = expectedResult;

                    if(cat === 'zip' || cat === 'number') {
                        // שדות אלה צריכים לדחות אותיות וסימנים
                        const isNumeric = /^[0-9]+$/.test(val);
                        const shouldPass = isNumeric ? !hasError : hasError;
                        testPassed = shouldPass;
                        resultMessage = isNumeric ? (hasError ? 'FAIL - should accept numbers' : 'PASS') : (hasError ? 'PASS - correctly rejected' : 'FAIL - should reject');
                        // תיקון: ה-expected צריך להיות בהתאם לערך בפועל
                        if(isNumeric) {
                            expectedForValue = 'Should be accepted';
                        } else {
                            expectedForValue = 'Should be rejected';
                        }
                    } else if(cat === 'email') {
                        // אימייל צריך לדחות פורמט בלתי תקין
                        const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
                        const shouldPass = isValidEmail ? !hasError : hasError;
                        testPassed = shouldPass;
                        expectedForValue = isValidEmail ? 'Should be accepted' : 'Should be rejected';
                        resultMessage = isValidEmail ? (hasError ? 'FAIL - should accept valid email' : 'PASS') : (hasError ? 'PASS - correctly rejected' : 'FAIL - should reject');
                    } else if(cat === 'tel') {
                        // טלפון צריך לדחות פורמט בלתי תקין
                        const isValidPhone = /^[0-9+\-\s()]+$/.test(val);
                        const shouldPass = isValidPhone ? !hasError : hasError;
                        testPassed = shouldPass;
                        expectedForValue = isValidPhone ? 'Should be accepted' : 'Should be rejected';
                        resultMessage = isValidPhone ? (hasError ? 'FAIL - should accept valid phone' : 'PASS') : (hasError ? 'PASS - correctly rejected' : 'FAIL - should reject');
                    } else {
                        // שדות TEXT - בדוק אם יש ערכים מסוכנים (XSS, SQL Injection)
                        const isSuspiciousValue = /(<script|javascript:|onerror=|onclick=|'.*OR.*'|DROP|DELETE|UNION|SELECT)/i.test(val);

                        if(isSuspiciousValue) {
                            // ערכים מסוכנים צריכים תמיד להיות מדוחים
                            testPassed = hasError;
                            expectedForValue = 'Should be rejected (Security)';
                            resultMessage = hasError ? 'PASS - correctly blocked security threat' : '🔴 FAIL - SECURITY RISK: accepted malicious input!';
                        } else {
                            // ערכים רגילים - יש לדווח בלבד, לא להכריע
                            testPassed = null; // null = דיווח בלבד, לא PASS/FAIL
                            expectedForValue = 'Manual review needed';
                            resultMessage = !hasError ? 'Accepted input' : 'Rejected input';
                        }
                    }

                    // אם testPassed הוא null, זה דיווח בלבד (לא PASS/FAIL מוגדר)
                    const passStatus = testPassed !== null ? testPassed : true;
                    // include actual error message if captured
                    const fullMessage = errorMessage ? ('  Value: "' + val + '" - ' + resultMessage + ' | Error: ' + errorMessage) : ('  Value: "' + val + '" - ' + resultMessage);
                    log(fullMessage, passStatus, 'test', i.name, val, expectedForValue);
                    await delay(80);
                }
            }
        }
        log('--- HAPPY FLOW SIMULATION: ' + f.id + ' ---', true, 'header');
        f.inputs.forEach(i => {
            const el = document.getElementsByName(i.name)[0] || document.getElementById(i.name);
            if(!el) return;
            if(i.type === 'checkbox') el.checked = true;
            else if(i.name.toLowerCase().includes('email')) el.value = "success@qa.pro";
            else if(i.name.toLowerCase().includes('phone')) el.value = "0501234567";
            else el.value = "QA Auto Success";
            el.dispatchEvent(new Event('change', {bubbles:true}));
        });
        log('Happy flow data populated for ' + f.id, true, 'pass');
    }

    // ===== ADDITIONAL PAGE VALIDATION TESTS =====
    log('--- PAGE QUALITY CHECKS ---', true, 'header');

    // בדוק Links
    log('Validating Links', true, 'action');
    const links = document.querySelectorAll('a');
    let brokenLinks = 0, externalLinks = 0;
    links.forEach(link => {
        const href = link.getAttribute('href');
        if(!href || href === '#' || href.startsWith('javascript:')) {
            brokenLinks++;
        }
        if(href && href.startsWith('http') && !href.includes(window.location.hostname)) {
            externalLinks++;
        }
    });
    log('Total Links: ' + links.length + ' | Broken: ' + brokenLinks + ' | External: ' + externalLinks, brokenLinks === 0, 'test', 'Links', brokenLinks + ' broken', 'All links should have valid href');

    // בדוק Images
    log('Validating Images', true, 'action');
    const images = document.querySelectorAll('img');
    let missingAlt = 0;
    images.forEach(img => {
        if(!img.getAttribute('alt') || img.getAttribute('alt').trim() === '') {
            missingAlt++;
        }
    });
    log('Total Images: ' + images.length + ' | Missing Alt: ' + missingAlt, missingAlt === 0, 'test', 'Images', missingAlt + ' missing alt', 'All images should have alt text');

    // בדוק Accessibility - Labels
    log('Validating Accessibility', true, 'action');
    const inputs = document.querySelectorAll('input, textarea, select');
    let missingLabels = 0;
    inputs.forEach(input => {
        const id = input.getAttribute('id');
        const hasLabel = id && document.querySelector('label[for="' + id + '"]');
        const hasAriaLabel = input.getAttribute('aria-label') || input.getAttribute('aria-labelledby');
        if(!hasLabel && !hasAriaLabel && input.getAttribute('placeholder') === null) {
            missingLabels++;
        }
    });
    log('Total Inputs: ' + inputs.length + ' | Missing Labels: ' + missingLabels, missingLabels <= Math.ceil(inputs.length * 0.2), 'test', 'Accessibility', missingLabels + ' inputs', 'Form fields should have labels or aria-labels');

    // בדוק ARIA Roles
    log('Validating ARIA Roles', true, 'action');
    const ariaElements = document.querySelectorAll('[role]');
    let validRoles = 0;
    const validAriaRoles = ['button', 'link', 'navigation', 'main', 'region', 'alert', 'dialog', 'tab', 'tabpanel', 'menuitem', 'checkbox', 'radio'];
    ariaElements.forEach(el => {
        const role = el.getAttribute('role');
        if(validAriaRoles.includes(role)) {
            validRoles++;
        }
    });
    log('Total ARIA elements: ' + ariaElements.length + ' | Valid roles: ' + validRoles, validRoles >= ariaElements.length * 0.8 || ariaElements.length === 0, 'test', 'ARIA', validRoles + ' valid', 'ARIA roles should be valid');

    // בדוק Color Contrast (בדיקה בסיסית)
    log('Checking Color Contrast', true, 'action');
    const textElements = document.querySelectorAll('p, a, button, label, input, span');
    let lowContrastWarnings = 0;
    // This is a simplified check - in production use WCAG contrast checker
    log('Text elements checked: ' + textElements.length + ' | Low contrast warnings: ' + lowContrastWarnings, true, 'test', 'Contrast', 'See manual review', 'Text should have adequate contrast (4.5:1 for normal, 3:1 for large)');

    // בדוק Keyboard Navigation
    log('Checking Keyboard Navigation', true, 'action');
    const interactiveElements = document.querySelectorAll('button, a, input, select, textarea, [role="button"]');

    function analyzeResults() {
        let raw = document.getElementById('resultJson').value.trim();
        try {
            if(raw.startsWith('"') && raw.endsWith('"')) raw = JSON.parse(raw);
            const data = JSON.parse(raw);

            testOverrides = {}; // Reset overrides

            const board = document.getElementById('resultsBoard');

            // חישוב סטטיסטיקה
            const passCount = allTestsData.filter(t => t.pass).length;
            const failCount = allTestsData.filter(t => !t.pass).length;
            const passPercent = allTestsData.length > 0 ? Math.round((passCount / allTestsData.length) * 100) : 0;

            const t = translations[currentLanguage];

                <div class="stat-card success">
                    <div class="stat-value">✓ ${passCount}</div>
                    <div class="stat-label">${t.passed}</div>
                </div>
                <div class="stat-card fail">

                </div>

                    <div class="stat-label">${t.totalTests}</div>
                </div>

                    <div class="stat-label">${t.successRate}</div>
                </div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;

            // סינון כפתורים
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = `
                <button class="filter-btn active" onclick="filterResults('all')">${t.all} (${allTestsData.length})</button>

            renderTable(allTestsData);

        } catch(e) {

            alert(t.jsonError + '\n' + e.message);

    }

    function filterResults(filter) {
        currentFilter = filter;
        const filtered = filter === 'all' ? allTestsData : allTestsData.filter(t => filter === 'pass' ? t.pass : !t.pass);
        renderTable(filtered);

        // עדכון כפתורים פעילים
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function renderTable(tests) {
        const tbody = document.getElementById('resultsTableBody');
        tbody.innerHTML = '';
        const t = translations[currentLanguage];

        tests.forEach((test, idx) => {
            // Find the original index in allTestsData
            const originalIdx = allTestsData.findIndex(t => t.field === test.field && t.testValue === test.testValue);

            // Check if there's a manual override
            const override = testOverrides[originalIdx];
            const finalPass = override === undefined ? test.pass : (override === 'pass');

            const statusClass = finalPass ? 'status-pass' : 'status-fail';
            const statusText = finalPass ? t.statusPass : t.statusFail;

            const tr = document.createElement('tr');
            // Extract ONLY the error message from test.msg
            let actualResult = '';
            if(test.msg) {
                // Check if there's an error message after the pipe separator
                if(test.msg.includes(' | Error: ')) {
                    // Extract only the error message part
                    actualResult = test.msg.split(' | Error: ')[1] || 'No error message';
                } else {
                    // If no error format, show empty (field was accepted)
                    actualResult = '';
                }
            }

            tr.innerHTML = `
                <td>
                    <div class="field-name">${test.field}</div>
                </td>
                <td>
                    <div class="test-value">${escapeHtml(String(test.testValue))}</div>
                </td>
                <td>
                    <div class="test-value">${escapeHtml(String(test.expected || ''))}</div>
                </td>
                <td>
                    <div class="test-value" style="color: #94a3b8; font-size: 12px;">${escapeHtml(actualResult)}</div>
                </td>
                <td>
                    <span class="${statusClass}">${statusText}</span>
                </td>
                <td>
                    <select class="status-override" onchange="setTestOverride(${originalIdx}, this.value)">
                        <option value="">${t.resetOverride}</option>
                        <option value="pass">${t.passOverride}</option>
                        <option value="fail">${t.failOverride}</option>
                    </select>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function setTestOverride(testIdx, value) {
        if(value === '') {
            delete testOverrides[testIdx];
        } else {
            testOverrides[testIdx] = value;
        }
        // Re-render table to update status colors
        const currentFilterValue = currentFilter;
        filterResults(currentFilterValue);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function downloadPlaywright() {
        const raw = document.getElementById('inputJson').value;
        if(!raw) return;
        const data = JSON.parse(raw);
        const content = `import { test, expect } from '@playwright/test';\n\ntest('Deep QA Scan', async ({ page }) => {\n  await page.goto('${data.url || ''}');\n  ${data.forms.map(f => `// Form: ${f.id}\n  ${f.inputs.map(i => `await page.locator('[name="${i.name}"]').fill('QA Data');`).join('\n  ')}`).join('\n  ')}\n});`;
        const blob = new Blob([content], {type:'text/javascript'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'full_qa.spec.ts'; a.click();
    }

    function exportToExcel() {
        // הכנת נתונים בפורמט בהיר - with override support
        const exportData = allTestsData.map((test, idx) => {
            const override = testOverrides[idx];
            const finalPass = override === undefined ? test.pass : (override === 'pass');

            return {
                'מס"ד': idx + 1,
                'שם השדה': test.field,
                'הערך שנבדק': test.testValue,
                'תוצאה צפויה': test.expected || '',
                'תוצאה בפועל': test.msg || '',
                'תוצאה': finalPass ? 'עבר' : 'נכשל',
                'סטטוס': finalPass ? 'PASS' : 'FAIL',
                'עקוף': override === undefined ? 'No' : 'Yes'
            };
        });

        // סיכום - use final counts with overrides
        const passCount = allTestsData.filter((t, idx) => {
            const override = testOverrides[idx];
            return override === undefined ? t.pass : (override === 'pass');
        }).length;
        const failCount = allTestsData.length - passCount;

        const ws = XLSX.utils.json_to_sheet(exportData);

        // עיצוב עמודות

            { wch: 6 },   // מס"ד
            { wch: 25 },  // שם השדה

            { wch: 8 },   // סטטוס
            { wch: 8 }    // עקוף
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "QA_Results");

            ['סיכום בדיקות'],
            [],
